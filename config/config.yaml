# 非敏感配置文件。
# API Key、邮箱、Cookie 等敏感信息不写在这里，而是通过 `.env` 注入。

project:
  # 项目名称，仅用于标识当前服务。
  name: paper-search-agent
  # 默认检索模式，可选 quick / deep / fusion。
  default_mode: quick
  # 默认语言偏好，用于检索规划或默认过滤。
  default_language: en

http:
  # 单次 HTTP 请求的总超时时间，单位秒。
  request_timeout_seconds: 30
  # 建立连接阶段的超时时间，单位秒。
  connect_timeout_seconds: 10
  # 请求失败后的最大重试次数。
  max_retries: 2
  # 对外请求时使用的 User-Agent。
  user_agent: paper-search-agent/0.1

retrieval:
  # 默认召回的候选论文数量。
  default_top_k_recall: 200
  # 默认最终返回给上层的结果数量。
  default_top_k_return: 20
  # 是否启用多源结果去重。
  enable_dedup: true
  # 去重时优先使用的标识字段顺序。
  dedup_primary_keys:
    # DOI 去重。
    - doi
    # arXiv ID 去重。
    - arxiv_id
    # 平台自身的论文 ID 去重。
    - paper_id
    # 标题 + 年份 + 作者近似去重。
    - title_year_author

llm:
  # 大模型服务提供方，例如 openai / azure_openai / openrouter / 自建兼容服务。
  provider: openai
  # 默认使用的大模型名称。
  model: gpt-5.2
  # LLM API 根地址，支持 OpenAI 兼容网关。
  api_base: https://gmncode.cn/v1
  # 从 `.env` 读取 LLM API Key 的环境变量名。
  api_key_env: LLM_API_KEY
  # 接口选择策略。
  # 可选：
  # - auto: 运行时根据 preference 自动选择 responses 或 chat_completions
  # - responses: 强制走 Responses API
  # - chat_completions: 强制走 Chat Completions API
  api_interface: auto
  # 当 `api_interface=auto` 时的优先接口。
  # 可选：responses / chat_completions
  api_interface_preference: responses
  # 默认温度。
  temperature: 0.2
  # 默认最大输出 token 数，0 表示由调用侧自行决定。
  max_output_tokens: 0
  # 请求超时时间，单位秒。
  request_timeout_seconds: 60
  # 是否在服务启动时打印当前接口选择策略。
  log_interface_selection: true

embedding:
  # 向量服务提供方，例如 openai / azure_openai / 自建兼容服务。
  provider: openai
  # 默认使用的嵌入模型名称。
  model: text-embedding-v4
  # Embedding API 根地址，支持 OpenAI 兼容网关。
  api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
  # 从 `.env` 读取 Embedding API Key 的环境变量名。
  api_key_env: EMBED_API_KEY
  # 向量维度。
  dim: 1024
  # 单次批量嵌入的文本条数。
  batch_size: 10
  # 请求超时时间，单位秒。
  request_timeout_seconds: 60

sources:
  openalex:
    # 系统是否已经实现并允许加载该检索源。
    enabled: true
    # 是否默认对用户开放该检索源。
    public_enabled: true
    # 是否允许该源参与 Quick Search。
    supports_quick: true
    # 是否允许该源参与 Deep Search。
    supports_deep: true
    # 是否允许该源参与 Fusion 模式。
    supports_fusion: true
    # OpenAlex API 根地址。
    base_url: https://api.openalex.org
    # 从 `.env` 读取 OpenAlex API Key 的环境变量名。
    api_key_env: OPENALEX_API_KEY
    # works 检索接口路径。
    works_path: /works
    # works 自动补全接口路径。
    autocomplete_path: /autocomplete/works
    # 默认每页条数。
    default_per_page: 25
    # 每页最大条数。
    max_per_page: 100
    # 是否支持 cursor 深分页。
    supports_cursor: true
    # 是否支持 `search.semantic` 语义检索。
    supports_semantic_search: true
    # 语义检索建议速率限制，单位 RPS。
    semantic_rate_limit_rps: 1.0
    # 语义检索单次最大结果数。
    semantic_max_results: 50
    # 是否支持 OpenAlex 的内容下载能力。
    supports_content_download: true
    # 是否支持 PDF/全文可用性信号。
    supports_pdf_availability_signal: true
    # 是否支持参考文献列表拉取。
    supports_reference_fetch: false
    # 当前源的请求超时时间，单位秒。
    request_timeout_seconds: 30

  semanticscholar:
    # 系统是否已经实现并允许加载该检索源。
    enabled: true
    # 是否默认对用户开放该检索源。
    public_enabled: true
    # 是否允许该源参与 Quick Search。
    supports_quick: true
    # 是否允许该源参与 Deep Search。
    supports_deep: true
    # 是否允许该源参与 Fusion 模式。
    supports_fusion: true
    # Graph API 根地址。
    graph_base_url: https://api.semanticscholar.org/graph/v1
    # Recommendations API 根地址。
    recommendations_base_url: https://api.semanticscholar.org/recommendations/v1
    # Datasets API 根地址。
    datasets_base_url: https://api.semanticscholar.org/datasets/v1
    # 从 `.env` 读取 Semantic Scholar API Key 的环境变量名。
    api_key_env: SEMANTIC_SCHOLAR_API_KEY
    # 普通论文搜索接口路径。
    paper_search_path: /paper/search
    # Bulk 检索接口路径，适合深分页和批量拉取。
    paper_bulk_search_path: /paper/search/bulk
    # 批量回表详情接口路径。
    paper_batch_path: /paper/batch
    # snippet 搜索接口路径。
    snippet_search_path: /snippet/search
    # 默认单次检索条数。
    default_limit: 25
    # 单次检索最大条数。
    max_limit: 100
    # bulk 检索每批建议条数。
    bulk_page_size: 1000
    # 是否优先筛选带开放 PDF 的论文。
    prefer_open_access_pdf: true
    # 是否支持 snippet 检索。
    supports_snippet_search: true
    # 是否支持相关推荐接口。
    supports_recommendations: true
    # 是否支持参考文献和引用关系拉取。
    supports_reference_fetch: true
    # 是否支持返回公开 PDF 链接。
    supports_pdf_link: true
    # 当前源的请求超时时间，单位秒。
    request_timeout_seconds: 30
    # 初期接入建议的速率限制，单位 RPS。
    recommended_initial_rate_limit_rps: 1.0

  core:
    # 系统是否已经实现并允许加载该检索源。
    enabled: true
    # 是否默认对用户开放该检索源。
    public_enabled: true
    # 是否允许该源参与 Quick Search。
    supports_quick: true
    # 是否允许该源参与 Deep Search。
    supports_deep: true
    # 是否允许该源参与 Fusion 模式。
    supports_fusion: true
    # CORE API v3 根地址。
    base_url: https://api.core.ac.uk/v3
    # 从 `.env` 读取 CORE API Key 的环境变量名。
    api_key_env: CORE_API_KEY
    # works 检索接口路径。
    works_search_path: /search/works
    # outputs 检索接口路径。
    outputs_search_path: /search/outputs
    # DOI / 标题到全文链接发现接口路径。
    discover_path: /discover
    # work 级下载接口模板。
    works_download_path: /works/{identifier}/download
    # output 级下载接口模板。
    outputs_download_path: /outputs/{identifier}/download
    # 默认单次检索条数。
    default_limit: 25
    # 是否支持全文字段搜索。
    supports_fulltext_search: true
    # 是否支持返回原始 downloadUrl。
    supports_download_url: true
    # 是否支持官方下载 API。
    supports_download_api: true
    # 是否支持参考文献列表拉取。
    supports_reference_fetch: true
    # 是否只有认证用户才能拿全文。
    fulltext_requires_authenticated_user: true
    # 匿名用户每日 token 配额。
    unauthenticated_tokens_per_day: 100
    # 匿名用户每分钟请求上限。
    unauthenticated_requests_per_minute: 10
    # 当前源的请求超时时间，单位秒。
    request_timeout_seconds: 30

  unpaywall:
    # 系统是否已经实现并允许加载该检索源。
    enabled: true
    # 是否默认对用户开放该检索源。
    # Unpaywall 更适合作为 enrich / resolver，因此默认不作为主检索源开放。
    public_enabled: false
    # 是否允许该源参与 Quick Search。
    supports_quick: false
    # 是否允许该源参与 Deep Search。
    supports_deep: false
    # 是否允许该源参与 Fusion 模式。
    supports_fusion: false
    # Unpaywall API 根地址。
    base_url: https://api.unpaywall.org/v2
    # 从 `.env` 读取联系邮箱的环境变量名。
    email_env: UNPAYWALL_EMAIL
    # DOI 查询接口模板。
    doi_lookup_path: /{doi}
    # 标题检索接口路径。
    search_path: /search
    # 默认每页结果数。
    default_page_size: 50
    # 是否要求每次请求都带 email。
    require_email: true
    # 是否支持 OA 状态和全文入口解析。
    supports_oa_resolution: true
    # 是否支持返回 PDF 链接。
    supports_pdf_link: true
    # 是否支持参考文献列表拉取。
    supports_reference_fetch: false
    # 官方公开建议的每日调用上限。
    max_calls_per_day: 100000
    # 当前源的请求超时时间，单位秒。
    request_timeout_seconds: 20

  arxiv:
    # 系统是否已经实现并允许加载该检索源。
    enabled: true
    # 是否默认对用户开放该检索源。
    public_enabled: true
    # 是否允许该源参与 Quick Search。
    supports_quick: true
    # 是否允许该源参与 Deep Search。
    supports_deep: true
    # 是否允许该源参与 Fusion 模式。
    supports_fusion: true
    # arXiv 查询 API 根地址。
    base_url: http://export.arxiv.org/api/query
    # 是否需要 API Key。
    requires_api_key: false
    # 默认单次检索条数。
    default_page_size: 25
    # 单次检索最大条数。
    max_page_size: 2000
    # 单个查询窗口最大结果数。
    max_total_results: 30000
    # 官方建议的请求间隔，单位秒。
    request_interval_seconds: 3.0
    # 同时允许的最大并发请求数。
    max_concurrent_requests: 1
    # 是否支持 PDF 链接。
    supports_pdf_link: true
    # 是否支持参考文献列表拉取。
    supports_reference_fetch: false
    # 当前源的请求超时时间，单位秒。
    request_timeout_seconds: 30

  ieee:
    # 系统是否已经实现并允许加载该检索源。
    enabled: true
    # 是否默认对用户开放该检索源。
    public_enabled: true
    # 是否允许该源参与 Quick Search。
    supports_quick: true
    # 是否允许该源参与 Deep Search。
    supports_deep: true
    # 是否允许该源参与 Fusion 模式。
    supports_fusion: true
    # IEEE Xplore API 根地址。
    base_url: https://ieeexploreapi.ieee.org/api/v1
    # 从 `.env` 读取 IEEE API Key 的环境变量名。
    api_key_env: IEEE_XPLORE_API_KEY
    # 元数据检索接口路径。
    metadata_search_path: /search/articles
    # DOI 查询接口模板。
    doi_lookup_path: /articles/doi/{doi_values}
    # 全文获取接口模板。
    fulltext_path: /search/document/{article_number}/fulltext
    # 默认单次检索条数。
    default_page_size: 25
    # 是否强制要求 API Key。
    requires_api_key: true
    # 是否必须先拿到 article_number 才能拉全文。
    requires_article_number_for_fulltext: true
    # 是否支持 PDF 链接。
    supports_pdf_link: true
    # 是否支持参考文献列表拉取。
    supports_reference_fetch: false
    # 是否需要严格遵守使用条款。
    respect_usage_policy: true
    # 当前源的请求超时时间，单位秒。
    request_timeout_seconds: 30

  wanfang:
    # 系统是否已经实现并允许加载该检索源。
    enabled: false
    # 是否默认对用户开放该检索源。
    public_enabled: false
    # 是否允许该源参与 Quick Search。
    supports_quick: true
    # 是否允许该源参与 Deep Search。
    supports_deep: true
    # 是否允许该源参与 Fusion 模式。
    supports_fusion: true
    # 万方授权后的实际网关根地址，占位符需要替换成真实值。
    api_base_url: REPLACE_WITH_AUTHORIZED_WANFANG_GATEWAY_BASE_URL
    # 万方开放平台门户地址。
    portal_base_url: https://open.wf.pub
    # 从 `.env` 读取 AppKey 的环境变量名。
    app_key_env: WANFANG_APP_KEY
    # 从 `.env` 读取 AppSecret 的环境变量名。
    app_secret_env: WANFANG_APP_SECRET
    # 从 `.env` 读取 AppCode 的环境变量名。
    app_code_env: WANFANG_APP_CODE
    # 鉴权模式，当前预留为 appcode 或签名模式。
    auth_mode: appcode_or_signature
    # 检索接口路径。
    query_path: /query
    # 单条详情接口路径。
    get_path: /get
    # 聚类统计接口路径。
    facet_path: /facet
    # 自然语言转检索式接口路径。
    text2solr_path: /text2Solr
    # 全文接口路径。
    fulltext_path: /fulltext
    # 默认返回条数。
    default_rows: 20
    # 单次最大返回条数。
    max_rows: 100
    # 普通翻页的最大 start 值。
    max_start: 5000
    # 是否支持 cursor_mark 深翻页。
    supports_cursor_mark: true
    # 是否支持全文下载。
    supports_fulltext_download: true
    # 全文返回体编码方式。
    fulltext_payload_encoding: base64
    # 是否支持参考文献列表拉取。
    supports_reference_fetch: false
    # 当前源的请求超时时间，单位秒。
    request_timeout_seconds: 45
    # 是否建议使用低并发接入。
    recommended_low_concurrency_mode: true

  cnki:
    # 系统是否已经实现并允许加载该检索源。
    enabled: false
    # 是否默认对用户开放该检索源。
    public_enabled: false
    # 是否允许该源参与 Quick Search。
    supports_quick: true
    # 是否允许该源参与 Deep Search。
    supports_deep: true
    # 是否允许该源参与 Fusion 模式。
    supports_fusion: true
    # CNKI 门户地址。
    portal_base_url: https://oversea.cnki.net
    # 正式授权后的 API 根地址，占位符需要替换成真实值。
    api_base_url: REPLACE_WITH_AUTHORIZED_CNKI_API_BASE_URL
    # 从 `.env` 读取 AppId 的环境变量名。
    app_id_env: CNKI_APP_ID
    # 从 `.env` 读取 AppSecret 的环境变量名。
    app_secret_env: CNKI_APP_SECRET
    # 从 `.env` 读取会话 Cookie 的环境变量名。
    session_cookie_env: CNKI_SESSION_COOKIE
    # 是否要求正式授权合同后才能启用。
    requires_authorized_contract: true
    # 是否支持 PDF 链接。
    supports_pdf_link: true
    # 是否支持参考文献列表拉取。
    supports_reference_fetch: true
    # 全文是否可公开程序化访问。
    fulltext_access_public: false
    # 自动化下载风险等级。
    download_automation_risk: high
    # 当前源的请求超时时间，单位秒。
    request_timeout_seconds: 30
